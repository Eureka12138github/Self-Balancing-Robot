; ============================================================
; 调试环境 - 用于 PID 参数整定和故障排查
; ============================================================
[env:debug]
platform = ststm32
board = genericSTM32F103C8
framework = cmsis

build_flags = 
    -D USE_STDPERIPH_DRIVER
    -D HSE_VALUE=8000000U
    -D STM32F10X_MD
    -D DEBUG_MODE
    
    ; ========== 调试优化配置 ==========
    -O0          ; 禁用所有优化，便于调试
    -g3          ; 生成完整调试信息
    -fno-omit-frame-pointer  ; 保留帧指针，便于回溯
    
    ; 包含路径（与 release 保持一致）
    -I lib/CMSIS
    -I lib/STM32F10x_StdPeriph_Driver
    -I src
    -I src/app
    -I src/app/control
    -I src/app/storage
    -I src/config
    -I src/drivers/Communication
    -I src/drivers/Display
    -I src/drivers/Display/Fonts
    -I src/drivers/IMU
    -I src/drivers/Input
    -I src/drivers/LED
    -I src/drivers/Output
    -I src/drivers/Sensors
    -I src/system/stm32f103c8t6_minidev
    -I src/utils/PID
    -I src/utils/buffer
    -I src/utils/debug
    -I src/utils/kalman
    -I src/app/task
    -I src/app/ui/ui_content
    -I src/app/ui/ui_framework

build_src_filter = 
    +<app/**/*.c>
    -<app/control/control_kalman_example.c>  ; 示例文件不编译
    +<config/**/*.c>
    -<config/system_config_example.c>
    +<system/**/*.c>
    +<drivers/**/*.c>
    -<drivers/Input/rotary_encoder.c>
    +<utils/**/*.c>
    -<system/stm32f103c8t6_minidev/delay_tim.c>
    +<../lib/STM32F10x_StdPeriph_Driver/misc.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_gpio.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_rcc.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_flash.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_exti.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_tim.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_usart.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_i2c.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_dma.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_adc.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_bkp.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_pwr.c>

upload_protocol = cmsis-dap
debug_tool = cmsis-dap
monitor_speed = 115200

; ============================================================
; 发布环境 - 用于最终部署和性能测试
; ============================================================
[env:release]
platform = ststm32
board = genericSTM32F103C8
framework = cmsis

build_flags = 
    -D USE_STDPERIPH_DRIVER
    -D HSE_VALUE=8000000U
    -D STM32F10X_MD
    -D RELEASE_MODE
    
    ; ========== 发布优化配置 ==========
    -O2          ; 高度优化，平衡速度和尺寸
    ; 或者使用 -Os  ; 如果 Flash 紧张
    
    ; 浮点运算优化（Cortex-M3 无 FPU，但仍有软件优化）
    -fsingle-precision-constant  ; 将 double 常量视为 float
    
    ; 实时性优化
    -finline-functions-called-once  ; 内联只调用一次的函数
    -freorder-blocks              ; 重排代码块提高缓存命中
    
    ; 包含路径（与 debug 保持一致）
    -I lib/CMSIS
    -I lib/STM32F10x_StdPeriph_Driver
    -I src
    -I src/app
    -I src/app/control
    -I src/app/storage
    -I src/config
    -I src/drivers/Communication
    -I src/drivers/Display
    -I src/drivers/Display/Fonts
    -I src/drivers/IMU
    -I src/drivers/Input
    -I src/drivers/LED
    -I src/drivers/Output
    -I src/drivers/Sensors
    -I src/system/stm32f103c8t6_minidev
    -I src/utils/PID
    -I src/utils/buffer
    -I src/utils/debug
    -I src/utils/kalman
    -I src/app/task
    -I src/app/ui/ui_content
    -I src/app/ui/ui_framework

build_src_filter = 
    +<app/**/*.c>
    -<app/control/control_kalman_example.c>  ; 示例文件不编译
    +<config/**/*.c>
    -<config/system_config_example.c>
    +<system/**/*.c>
    +<drivers/**/*.c>
    -<drivers/Input/rotary_encoder.c>
    +<utils/**/*.c>
    -<system/stm32f103c8t6_minidev/delay_tim.c>
    +<../lib/STM32F10x_StdPeriph_Driver/misc.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_gpio.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_rcc.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_flash.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_exti.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_tim.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_usart.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_i2c.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_dma.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_adc.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_bkp.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_pwr.c>

upload_protocol = cmsis-dap
debug_tool = cmsis-dap
monitor_speed = 115200