; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:genericSTM32F103C8]
platform = ststm32
board = genericSTM32F103C8
framework = cmsis

; STM32 标准外设库配置
build_flags = 
    -D USE_STDPERIPH_DRIVER
    -D HSE_VALUE=8000000U
    -D STM32F10X_MD  ; 中等容量设备（STM32F103C8 有 64KB Flash）
    ; 添加 CMSIS 头文件路径
    -I lib/CMSIS
    ; 添加标准外设库头文件路径
    -I lib/STM32F10x_StdPeriph_Driver
    ; 添加项目所有头文件路径（递归包含所有子目录）
    -I src
    -I src/app
    -I src/app/control
    -I src/app/storage
    -I src/app/system
    -I src/app/task
    -I src/app/ui/ui_conten
    -I src/app/ui/ui_framework
    -I src/config
    -I src/drivers
    -I src/drivers/Communication
    -I src/drivers/Display
    -I src/drivers/Display/Fonts
    -I src/drivers/IMU
    -I src/drivers/Input
    -I src/drivers/LED
    -I src/drivers/Output
    -I src/drivers/Sensors
    -I src/system/stm32f103c8t6_minidev
    -I src/utils/PID
    -I src/utils/buffer
    -I src/utils/debug

; 指定需要编译的源文件
; PlatformIO CMSIS 框架会自动编译 framework 中的启动文件
build_src_filter = 
    +<app/**/*.c>                                       ; 编译 app 下所有子目录的.c 文件
    +<config/**/*.c>                                    ; 编译 config 下所有子目录的.c 文件
    -<config/system_config_example.c>                   ; 排除示例文件，避免与 system_config.c 冲突
    +<system/**/*.c>                                    ; 编译 system 下所有子目录的.c 文件
    +<drivers/**/*.c>                                   ; 编译 drivers 下所有子目录的.c 文件
    -<drivers/Input/rotary_encoder.c>                   ; 旋转编码器已删除
    +<utils/**/*.c>                                     ; 编译 utils 下所有子目录的.c 文件
    -<system/stm32f103c8t6_minidev/delay_tim.c>         ; 排除重复的延时实现（使用 delay.c 即可）
    ; 根据需要使用的外设添加对应的驱动文件
    +<../lib/STM32F10x_StdPeriph_Driver/misc.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_gpio.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_rcc.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_flash.c>
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_exti.c>       ; EXTI 中断支持
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_tim.c>        ; 定时器支持
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_usart.c>      ; 串口支持
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_i2c.c>        ; I2C 支持
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_dma.c>        ; DMA 支持
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_adc.c>        ; ADC 支持
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_bkp.c>        ; 备份寄存器支持
    +<../lib/STM32F10x_StdPeriph_Driver/stm32f10x_pwr.c>        ; 电源管理支持

; 上传配置
upload_protocol = cmsis-dap
upload_speed = 2000000

; 调试配置
debug_tool = cmsis-dap

; 启用 verbose 模式以便调试编译问题
; build_flags = -v
